name: Release VSIX

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx --yes @vscode/vsce package --out "${{ runner.temp }}/vscode-leetnotion-${{ github.sha }}.vsix"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "main-${{ github.sha }}"
          name: "Build ${{ github.run_number }}"
          body: "Automated build from ${{ github.ref_name }} commit ${{ github.sha }}."
          files: "${{ runner.temp }}/vscode-leetnotion-${{ github.sha }}.vsix"
          prerelease: true
